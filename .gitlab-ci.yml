stages:
  - build
  - lint
  - test

.node_cache: &node_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  <<: *node_cache

lint:
  stage: lint
  image: node:20-alpine
  needs: [build]
  script:
    - npm run lint
  <<: *node_cache

test:
  stage: test
  image: node:20-alpine
  needs: [lint]
  variables:
    NODE_ENV: test
  script:
    - npm test
  artifacts:
    paths:
      - coverage/
    expire_in: 7 days
  <<: *node_cache
