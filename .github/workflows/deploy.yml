name: Deploy to GCP VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t api-tareas-express:latest .

      - name: Save image as tarball
        run: docker save api-tareas-express:latest -o api-tareas-express.tar

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer image to VM
        run: |
          scp -i ~/.ssh/deploy_key api-tareas-express.tar \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/MISEIA200_api-tareas-express/

      - name: Transfer docker-compose.prod.yml to VM
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/MISEIA200_api-tareas-express/

      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} '
            set -e
            cd ~/MISEIA200_api-tareas-express

            # Write .env.prod from secrets
            cat > .env.prod <<EOF
          PORT=3000
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=24h
          NODE_ENV=production
          EOF

            # Load image and start container
            docker load -i api-tareas-express.tar
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            # Verify container is running
            docker ps | grep api-tareas-express
          '
